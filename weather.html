<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Weather Query Bot | Beau Bremer</title>
    <link rel="stylesheet" href="fonts.css" />
    <link rel="icon" type="image/svg+xml" href="/img/favicon/favicon.svg" />
    <link rel="icon" type="image/webp" href="/img/favicon/favicon-32x32.webp" sizes="32x32" />
    <link rel="icon" type="image/webp" href="/img/favicon/favicon-96x96.webp" sizes="96x96" />
    <link rel="icon" type="image/png" href="/img/favicon/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/png" href="/img/favicon/favicon-32x32.png" sizes="32x32" />
    <link rel="apple-touch-icon" sizes="180x180" href="/img/favicon/apple-touch-icon.png" />
    <link rel="manifest" href="/img/favicon/site.webmanifest" />
    <link rel="shortcut icon" href="/img/favicon/favicon.ico" />
    <link rel="stylesheet" href="style.css" />
  </head>

  <body class="bg-gray-950 flex flex-col min-h-screen text-gray-50 scroll-smooth">
    <nav class="bg-gray-900/80 backdrop-blur-md p-6 border-b border-gray-800 sticky top-0 z-50">
      <div class="max-w-6xl mx-auto flex justify-between items-center">
        <a
          href="index.html"
          class="text-indigo-400 hover:text-indigo-300 font-bold text-xl transition-colors duration-300"
        >
          ← Back to Home
        </a>
      </div>
    </nav>

    <main class="flex-grow flex items-center justify-center p-6">
      <div
        class="w-full max-w-2xl bg-gray-900 rounded-2xl shadow-2xl flex flex-col h-[75vh] border border-gray-800 overflow-hidden"
      >
        <!-- Chat Header -->
        <div class="p-6 border-b border-gray-800 bg-gray-800/50 flex items-center space-x-4">
          <div
            class="relative flex items-center justify-center w-12 h-12 bg-indigo-600 rounded-full text-white shadow-lg shadow-indigo-600/20"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              class="w-7 h-7"
              fill="none"
              viewBox="0 0 24 24"
              stroke="currentColor"
              stroke-width="2"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="M3 15a4 4 0 004 4h9a5 5 0 10-.1-9.999 5.002 5.002 0 10-9.78 2.096A4.001 4.001 0 003 15z"
              />
            </svg>
          </div>
          <div>
            <h1 class="text-xl font-bold text-white tracking-tight">Weather Query Bot</h1>
            <p id="status" class="text-sm text-gray-400">Connecting...</p>
          </div>
        </div>

        <!-- Chat Messages -->
        <div
          id="chat-window"
          class="flex-1 p-6 overflow-y-auto space-y-6 scrollbar-thin scrollbar-thumb-gray-700"
        ></div>

        <!-- Typing Indicator -->
        <div id="typing-indicator" class="px-6 pb-4 hidden">
          <div class="flex items-center space-x-3">
            <div class="w-8 h-8 rounded-full bg-gray-800 flex items-center justify-center border border-gray-700">
              <svg
                xmlns="http://www.w3.org/2000/svg"
                class="w-4 h-4 text-gray-500"
                fill="none"
                viewBox="0 0 24 24"
                stroke="currentColor"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M3 15a4 4 0 004 4h9a5 5 0 10-.1-9.999 5.002 5.002 0 10-9.78 2.096A4.001 4.001 0 003 15z"
                />
              </svg>
            </div>
            <div class="bg-gray-800 rounded-2xl px-4 py-2 border border-gray-700">
              <div class="flex items-center space-x-1">
                <span class="w-1.5 h-1.5 bg-gray-500 rounded-full dot"></span>
                <span class="w-1.5 h-1.5 bg-gray-500 rounded-full dot dot-2"></span>
                <span class="w-1.5 h-1.5 bg-gray-500 rounded-full dot dot-3"></span>
              </div>
            </div>
          </div>
        </div>

        <!-- Input Area -->
        <div class="p-6 border-t border-gray-800 bg-gray-800/30">
          <form id="chat-form" class="flex items-center space-x-3">
            <input
              type="text"
              id="chat-input"
              placeholder="Ask about the weather..."
              class="flex-1 px-4 py-3 bg-gray-800 text-white border border-gray-700 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition placeholder-gray-500"
              autocomplete="off"
            />
            <button
              type="submit"
              class="bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-3 px-6 rounded-xl transition duration-300 shadow-lg shadow-indigo-600/20 active:scale-95 flex items-center space-x-2"
            >
              <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" viewBox="0 0 20 20" fill="currentColor">
                <path
                  d="M10.894 2.553a1 1 0 00-1.788 0l-7 14a1 1 0 001.169 1.409l5-1.429A1 1 0 009 15.571V11a1 1 0 112 0v4.571a1 1 0 00.725.962l5 1.428a1 1 0 001.17-1.408l-7-14z"
                />
              </svg>
              <span>Send</span>
            </button>
          </form>
          <div
            id="user-info"
            class="text-[10px] text-gray-600 pt-3 text-center uppercase tracking-widest font-bold"
          ></div>
        </div>
      </div>
    </main>

    <footer class="text-center py-10 bg-gray-950 text-gray-500 border-t border-gray-800">
      <p class="text-gray-400 text-sm">Handcrafted by me © 2026 Beau Bremer. Powered by Gemini API.</p>
    </footer>

    <script type="module" src="js/weather-bot.js"></script>
  </body>
</html>
