<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Daily Links | Beau Bremer</title>
    <link rel="canonical" href="https://beaubremer.com/daily-links" />
    <link rel="me" href="https://mastodon.social/@grimburly" />
    <link rel="me" href="https://github.com/KnowOneActual" />
    <link rel="me" href="https://defcon.social/@GrimBurly" />
    <link rel="icon" type="image/svg+xml" href="/img/favicon/favicon.svg" />
    <link rel="icon" type="image/webp" href="/img/favicon/favicon-32x32.webp" sizes="32x32" />
    <link rel="icon" type="image/webp" href="/img/favicon/favicon-96x96.webp" sizes="96x96" />
    <link rel="icon" type="image/png" href="/img/favicon/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/png" href="/img/favicon/favicon-32x32.png" sizes="32x32" />
    <link rel="apple-touch-icon" sizes="180x180" href="/img/favicon/apple-touch-icon.png" />
    <link rel="manifest" href="/img/favicon/site.webmanifest" />
    <link rel="shortcut icon" href="/img/favicon/favicon.ico" />

    <link href="fonts.css" rel="stylesheet" crossorigin="anonymous" />
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.0/css/all.min.css" />

    <style>
      .card-link {
        transition: all 0.3s ease;
        display: flex;
        align-items: center;
        justify-content: space-between;
        text-decoration: none;
        color: white;
      }

      .card-link:hover {
        transform: translateY(-4px) scale(1.01);
        box-shadow: 0 10px 15px -3px rgba(79, 70, 229, 0.4); /* indigo-600 */
      }

      .card-link.border-amber-500\/30:hover {
        box-shadow: 0 10px 15px -3px rgba(251, 191, 36, 0.4); /* amber-400 */
      }

      .card-link i,
      .card-link .svg-icon {
        width: 24px;
        text-align: center;
        color: #818cf8; /* indigo-400 */
      }

      .card-link .svg-icon svg {
        width: 100%;
        height: 100%;
      }

      /* Highlights search match */
      .highlight {
        background-color: rgba(99, 102, 241, 0.3); /* indigo-500 with opacity */
        color: #e2e8f0; /* slate-200 */
        border-radius: 2px;
        padding: 0 2px;
        font-weight: 700;
      }

      /* Category Pills */
      .pill-btn {
        transition: all 0.2s ease-in-out;
        border: 1px solid rgb(31, 41, 55); /* border-gray-800 */
        cursor: pointer;
      }

      .pill-btn:hover {
        border-color: rgba(129, 140, 248, 0.4); /* indigo-400/40 */
        background-color: rgba(17, 24, 39, 0.6); /* gray-900/60 */
      }

      .pill-btn.active {
        background-color: #4f46e5; /* indigo-600 */
        border-color: #6366f1; /* indigo-500 */
        color: white;
        box-shadow: 0 0 12px -2px rgba(99, 102, 241, 0.4);
      }

      .pill-btn.active.pill-pinned {
        background-color: #d97706; /* amber-600 */
        border-color: #f59e0b; /* amber-500 */
        box-shadow: 0 0 12px -2px rgba(245, 158, 11, 0.4);
      }
    </style>
  </head>

  <body class="bg-gray-950 text-white min-h-screen flex flex-col scroll-smooth">
    <nav class="bg-gray-900/80 backdrop-blur-md p-6 border-b border-gray-800 sticky top-0 z-50">
      <div class="max-w-6xl mx-auto flex justify-between items-center">
        <a
          href="index.html"
          class="text-indigo-400 hover:text-indigo-300 font-bold text-xl transition-colors duration-300"
        >
          ← Back to Home
        </a>
      </div>
    </nav>

    <main class="flex-grow max-w-4xl mx-auto py-16 px-6 w-full">
      <div class="text-center mb-12 fade-in">
        <h1 class="text-5xl font-extrabold mb-4 text-white tracking-tight">Daily Links Hub</h1>
        <p class="text-gray-400 text-lg leading-relaxed">A fast, professional launchpad to my most-used sites.</p>
      </div>

      <!-- Search & Filters Container -->
      <div class="mb-12 space-y-6 fade-in">
        <!-- Search Bar -->
        <div class="relative max-w-2xl mx-auto">
          <label for="search-input" class="sr-only">Search links</label>
          <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
            <i class="fa-solid fa-magnifying-glass text-gray-500 transition-colors animate-pulse" id="search-icon"></i>
          </div>
          <input
            type="text"
            id="search-input"
            placeholder="Search links, tags, or categories..."
            class="w-full bg-gray-900/50 backdrop-blur-md border border-gray-800 text-white placeholder-gray-500 rounded-xl pl-11 pr-24 py-3.5 text-base focus:outline-none focus:border-indigo-500/80 focus:ring-1 focus:ring-indigo-500/80 transition-all duration-300"
            autocomplete="off"
            spellcheck="false"
          />
          <!-- Keyboard shortcut indicator -->
          <div
            class="absolute inset-y-0 right-10 flex items-center pr-3 pointer-events-none transition-opacity duration-300"
            id="shortcut-badge"
          >
            <kbd
              class="hidden sm:inline-block px-2 py-1 text-xs font-semibold text-gray-400 bg-gray-800/80 border border-gray-700 rounded shadow-sm font-sans"
            >
              /
            </kbd>
          </div>
          <!-- Clear Button -->
          <button
            id="clear-search-btn"
            class="absolute inset-y-0 right-0 pr-4 flex items-center text-gray-500 hover:text-white transition-colors duration-200 hidden"
            aria-label="Clear search"
          >
            <i class="fa-solid fa-circle-xmark text-lg"></i>
          </button>
        </div>

        <!-- Category Filter Pills -->
        <div class="flex flex-wrap justify-center gap-2" id="category-pills">
          <!-- Dynamically populated category pills -->
        </div>
      </div>

      <div id="links-container" class="space-y-16">
        <div class="text-center text-gray-500 animate-pulse">Loading links...</div>
      </div>
    </main>

    <footer class="text-center py-10 bg-gray-950 text-gray-500 border-t border-gray-800">
      <div class="mb-6">
        <a
          href="https://blog.beaubremer.com/"
          target="_blank"
          rel="noopener noreferrer"
          class="hover:text-indigo-400 mx-3 transition"
          >Blog</a
        >
        <a href="privacy.html" class="hover:text-indigo-400 mx-3 transition">Privacy Policy</a>
      </div>
      <p class="text-gray-400 text-sm">Handcrafted by me © 2026 Beau Bremer. Built from scratch.</p>
    </footer>

    <script src="js/daily-links.js" defer></script>
  </body>
</html>
